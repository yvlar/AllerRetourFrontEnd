server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Sécurité : headers HTTP ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:8080 http://api:8080;" always;

    # ── React Router — SPA fallback ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API → backend JAX-RS CoRoute ───────────────────────────
    # Le frontend envoie sur /api/trajets → nginx rewrite → /trajets sur api:8080
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeout allongé pour la JVM au démarrage
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # ── Cache des assets statiques (hash Vite dans le nom) ────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Pas de cache pour index.html ──────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    server_tokens off;
}
